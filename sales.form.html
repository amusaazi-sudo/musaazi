<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Form</title>
    <link rel="stylesheet" href=".vscode/sales.css">
</head>

<body>
    <div class="sales-container">
        <form class="action">
            <section>
                <h1>💰 SALES REGISTRATION FORM</h1>
                <!-- <img src="sales-icon.png" alt="Sales Icon" style="width:50px; height:50px; margin-top:10px;"> -->

                <div class="input-container">
                    <div class="input-section">
                        <label for="customername">customername</label>
                        <input type="text">
                    </div>
                    <div class="input-section">
                        <label for="contact">contact</label>
                        <input type="text">
                    </div>
                    <div class="input-section">
                        <label for="salesdate">salesdate</label>
                        <input type="date">
                    </div>
                    <div class="input-section">
                        <label for="name">Item name</label>
                        <select name="" id="">
                            <option value="">select item</option>
                            <option value="1">nails</option>
                            <option value="1">cement</option>
                            <option value="1">paint</option>
                            <option value="1">ironsheets</option>
                            <option value="1">others</option>
                            <!-- <option value="1">nails</option> -->
                        </select>
                    </div>
                    <div class="input-section">
                        <label for="quantity">quantity</label>
                        <input type="number">
                    </div>
                    <div class="input-section">
                        <label for="unitprice">Unitprice</label>
                        <input type="number">
                    </div>
                    <div class="input-section">
                        <label for="amount">Amount</label>
                        <input type="number">
                    </div>
                    <div class="input-section">
                        <label for="color">color</label>
                        <input type="text" placeholder="optional">
                    </div>
                    <div class="input-section">
                        <label for="size">size</label>
                        <input type="text" placeholder="optional">
                    </div>
                    <div class="input-section">
                        <label for="type">type</label>
                        <input type="text" placeholder="optional">
                    </div>

                </div>
                <button type="submit">Submit</button>
            </section>
        </form>
    </div>
</body>

</html>
